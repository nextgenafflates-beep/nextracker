name: Deploy `geotracker/apps/web` to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Check Node version
        run: node --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Show diagnostics
        run: |
          echo "PWD: $(pwd)"
          node --version
          pnpm --version || true
          echo "Repo root listing:" && ls -la
          echo "geotracker listing:" && ls -la geotracker || true

      - name: Install dependencies
        working-directory: geotracker
        run: pnpm install --frozen-lockfile

      - name: Build `geotracker/apps/web`
        working-directory: geotracker/apps/web
        run: pnpm build

      - name: Check Vercel token
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "ERROR: VERCEL_TOKEN secret is not set. Add it to GitHub Secrets.";
            exit 1;
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Check Vercel version
        run: |
          which vercel
          vercel --version

      - name: Build with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        working-directory: geotracker/apps/web
        run: |
          vercel pull --yes --token $VERCEL_TOKEN
          vercel build --prod --token $VERCEL_TOKEN

      - name: Deploy to Vercel (pinned CLI, debug)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        working-directory: geotracker/apps/web
        run: |
          echo "Using VERCEL_TOKEN (present): ${VERCEL_TOKEN:+yes}"
          vercel --version
          vercel deploy --prebuilt --prod --yes --token $VERCEL_TOKEN

# Notes:
# - Create a Vercel personal token and save it as `VERCEL_TOKEN` in GitHub Secrets.
# - Prefer adding `DATABASE_URL` and other env vars directly in the Vercel project settings.
# - If you must pass an env var from GitHub, consider adding it as a Vercel project variable instead of exposing it in the action logs.