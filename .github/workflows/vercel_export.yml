name: Deploy `geotracker/apps/web` to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'

      - name: Check Node version
        run: node --version

      - name: Enable corepack and prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build `geotracker/apps/web`
        working-directory: geotracker/apps/web
        run: pnpm build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --confirm --token $VERCEL_TOKEN --cwd geotracker/apps/web

# Notes:
# - Create a Vercel personal token and save it as `VERCEL_TOKEN` in GitHub Secrets.
# - Prefer adding `DATABASE_URL` and other env vars directly in the Vercel project settings.
# - If you must pass an env var from GitHub, consider adding it as a Vercel project variable instead of exposing it in the action logs.